name: 编译 EasyLoan APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      app_url:
        description: 'EasyLoan 服务器地址'
        required: false
        default: 'http://192.168.31.1:2688'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 设置 Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: 生成签名密钥
        run: |
          keytool -genkey -v -keystore keystore.jks \
            -alias easyloan -keyalg RSA -keysize 2048 \
            -validity 36500 \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            -dname "CN=EasyLoan, OU=App, O=EasyLoan, L=Guangzhou, ST=Guangdong, C=CN"

      - name: 替换服务器地址
        if: github.event.inputs.app_url != ''
        run: |
          sed -i "s|http://192.168.31.1:2688|${{ github.event.inputs.app_url }}|g" \
            app/src/main/java/com/easyloan/app/MainActivity.kt

      - name: 编译 APK
        run: gradle assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: easyloan
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: EasyLoan-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90
